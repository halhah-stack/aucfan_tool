<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AucFan リサーチツール</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ヘッダー -->
<header class="header">
  <div class="header-inner">
    <h1 class="logo">🔍 AucFan リサーチツール</h1>
    <div class="header-status" id="headerStatus">待機中</div>
  </div>
</header>

<!-- コントロールパネル -->
<section class="control-panel">
  <div class="control-inner">

    <!-- スクレイピング開始フォーム -->
    <div class="start-form" id="startForm">

      <!-- キーワード（Mac用） -->
      <div class="form-row">
        <label>キーワード <span class="badge-mac">Mac</span>　ChromeでAucFanを開いた状態でキーワードを入力してスクレイピング開始</label>
        <input type="text" id="inputKeyword" placeholder="例: LEDライト" class="input-text">
      </div>

      <!-- iPhone/iPad用セクション -->
      <div class="iphone-section">
        <div class="iphone-section-title">📱 iPhone / iPadから操作する場合</div>

        <div class="form-row">
          <label>① AucFan 検索URLを貼り付ける　SafariでAucFanを検索 → URLをコピー → ここに貼り付け → MacのChromeが新規タブで開いてスクレイピング開始</label>
          <input type="text" id="inputStartUrl" placeholder="https://aucfan.com/search1/..." class="input-text input-url">
        </div>

        <div class="form-row">
          <label>② または MacのChromeで開いているAucFanタブを選ぶ　<span class="badge-iphone">iPhone / iPad 専用</span>　Macは直接Chromeで確認できるためこのボタンは不要です</label>
          <div class="tab-check-row">
            <button class="btn btn-secondary btn-sm" onclick="loadChromeTabs()">🔍 Chromeのタブを確認</button>
            <span class="url-hint" id="tabsHint"></span>
          </div>
          <div id="chromeTabs" class="chrome-tabs-list" style="display:none"></div>
        </div>
      </div>

      <div class="form-row-buttons">
        <button class="btn btn-primary" id="btnStart" onclick="startScraping()">
          ▶ スクレイピング開始
        </button>
        <button class="btn btn-warning" id="btnStop" onclick="stopScraping()" disabled>
          ■ 停止
        </button>
        <button class="btn btn-secondary" id="btnSessions" onclick="showSessions()">
          📂 過去セッション
        </button>
      </div>
    </div>

    <!-- 進捗バー -->
    <div class="progress-section" id="progressSection" style="display:none">
      <div class="progress-header">
        <span id="progressLabel">準備中...</span>
        <span id="progressCount">0件 / 0件</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
      <div class="progress-sub" id="progressSub"></div>
    </div>

    <!-- 統計 -->
    <div class="stats-row" id="statsRow" style="display:none">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">取得件数</div>
      </div>
      <div class="stat-card stat-candidate">
        <div class="stat-num" id="statCandidate">0</div>
        <div class="stat-label">仕入れ候補</div>
      </div>
      <div class="stat-card stat-review">
        <div class="stat-num" id="statReview">0</div>
        <div class="stat-label">要確認</div>
      </div>
      <div class="stat-card stat-ok">
        <div class="stat-num" id="statOk">0</div>
        <div class="stat-label">OK</div>
      </div>
      <div class="stat-card stat-ng">
        <div class="stat-num" id="statNg">0</div>
        <div class="stat-label">NG</div>
      </div>
    </div>
  </div>
</section>

<!-- フィルター -->
<section class="filter-section">
  <div class="filter-inner">
    <div class="filter-row">
      <div class="filter-group">
        <label>ステータス</label>
        <select id="filterStatus" onchange="applyFilter()">
          <option value="">すべて</option>
          <option value="candidate">仕入れ候補</option>
          <option value="waiting">確認待ち</option>
          <option value="review">要確認</option>
          <option value="ok">OK</option>
          <option value="ng">NG</option>
        </select>
      </div>
      <div class="filter-group">
        <label>価格（合計）</label>
        <div class="price-range">
          <input type="number" id="filterMinPrice" placeholder="0" value="0" onchange="applyFilter()">
          <span>〜</span>
          <input type="number" id="filterMaxPrice" placeholder="99999" value="99999" onchange="applyFilter()">
          <span>円</span>
        </div>
      </div>
      <div class="filter-group">
        <label>最小グループ数</label>
        <input type="number" id="filterMinGroup" placeholder="1" value="1" min="1" onchange="applyFilter()">
      </div>
      <div class="filter-group">
        <label>キーワード</label>
        <input type="text" id="filterKeyword" placeholder="タイトル検索..." oninput="applyFilter()">
      </div>
      <button class="btn btn-secondary btn-sm" onclick="resetFilter()">リセット</button>
      <button class="btn btn-success btn-sm" id="btnExport" onclick="exportCsv()">
        📊 CSVエクスポート
      </button>
      <button class="btn btn-secondary btn-sm" id="btnReport" onclick="showReport()">
        📈 分析レポート
      </button>
      <button class="btn btn-secondary btn-sm" id="btnExportHtml" onclick="exportHtml()">
        📱 HTML書き出し
      </button>
      <button class="btn btn-secondary btn-sm" id="btnSellerAnalysis" onclick="showSellerAnalysis()">
        🏪 セラー分析
      </button>
    </div>
  </div>
</section>

<!-- メインコンテンツ：商品グループカード -->
<main class="main-content">
  <div class="groups-header">
    <div id="groupsCount" class="groups-count">グループ: 0件</div>
    <div class="pagination" id="pagination"></div>
  </div>
  <div class="groups-grid" id="groupsGrid">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📦</div>
      <p>スクレイピングを開始すると商品が表示されます</p>
    </div>
  </div>
  <div class="pagination-bottom" id="paginationBottom"></div>
</main>

<!-- 過去セッション モーダル -->
<div class="modal-overlay" id="sessionsModal" style="display:none" onclick="hideModal('sessionsModal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2>過去のセッション</h2>
      <button class="modal-close" onclick="hideModal('sessionsModal')">✕</button>
    </div>
    <div class="modal-body" id="sessionsBody">
      <div class="loading">読み込み中...</div>
    </div>
  </div>
</div>

<!-- 商品詳細 モーダル -->
<div class="modal-overlay" id="itemModal" style="display:none" onclick="hideModal('itemModal')">
  <div class="modal modal-large" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="itemModalTitle">商品詳細</h2>
      <button class="modal-close" onclick="hideModal('itemModal')">✕</button>
    </div>
    <div class="modal-body" id="itemModalBody"></div>
  </div>
</div>

<!-- 分析レポート モーダル -->
<div class="modal-overlay" id="reportModal" style="display:none" onclick="hideModal('reportModal')">
  <div class="modal modal-large" onclick="event.stopPropagation()" style="max-width:900px;max-height:90vh;overflow-y:auto">
    <div class="modal-header">
      <h2>📈 分析レポート</h2>
      <button class="modal-close" onclick="hideModal('reportModal')">✕</button>
    </div>
    <div class="modal-body" id="reportBody">
      <div class="loading">読み込み中...</div>
    </div>
  </div>
</div>

<!-- セラー分析 モーダル -->
<div class="modal-overlay" id="sellerModal" style="display:none" onclick="hideModal('sellerModal')">
  <div class="modal modal-large" onclick="event.stopPropagation()" style="max-width:860px;max-height:92vh;display:flex;flex-direction:column">
    <div class="modal-header">
      <h2>🏪 セラー分析スクレイピング</h2>
      <button class="modal-close" onclick="hideModal('sellerModal')">✕</button>
    </div>
    <div class="modal-body" id="sellerModalBody" style="overflow-y:auto;flex:1">

      <!-- Step 1: CSVアップロード -->
      <div id="sellerStep1">
        <p style="margin-bottom:12px;color:#4b5563;font-size:14px">
          キーワードスクレイピングで保存した <strong>results.csv</strong> をアップロードすると、含まれるセラーIDを抽出してセラーごとにスクレイピングできます。
        </p>
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px">
          <label class="btn btn-primary" style="cursor:pointer">
            📂 CSVファイルを選択
            <input type="file" id="sellerCsvInput" accept=".csv" style="display:none" onchange="importSellerCsv(this)">
          </label>
          <span id="sellerCsvName" style="color:#6b7280;font-size:13px">ファイル未選択</span>
        </div>
        <div id="sellerImportResult" style="display:none">
          <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px;margin-bottom:12px;font-size:14px">
            <strong id="sellerImportSummary"></strong>
          </div>
          <!-- セラーリスト -->
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span style="font-size:13px;color:#6b7280" id="sellerListMeta"></span>
            <div style="display:flex;gap:8px">
              <button class="btn btn-primary btn-sm" id="btnSellerStart" onclick="startSellerScraping()">
                ▶ スクレイピング開始
              </button>
              <button class="btn btn-warning btn-sm" id="btnSellerStop" onclick="stopSellerScraping()" disabled>
                ■ 停止
              </button>
              <button class="btn btn-secondary btn-sm" onclick="resetSellerScraping()">
                🗑 リセット
              </button>
            </div>
          </div>
          <!-- 進捗バー -->
          <div id="sellerProgressWrap" style="display:none;margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
              <span id="sellerProgressLabel">処理中...</span>
              <span id="sellerProgressCount"></span>
            </div>
            <div style="background:#e5e7eb;border-radius:4px;height:8px;overflow:hidden">
              <div id="sellerProgressBar" style="background:#2563eb;height:100%;width:0%;transition:width .3s"></div>
            </div>
          </div>
          <!-- セラーテーブル -->
          <div style="overflow-y:auto;max-height:380px;border:1px solid #e5e7eb;border-radius:8px">
            <table style="width:100%;border-collapse:collapse;font-size:13px" id="sellerTable">
              <thead style="position:sticky;top:0;background:#f9fafb;z-index:1">
                <tr>
                  <th style="padding:8px 12px;text-align:left;border-bottom:1px solid #e5e7eb;font-weight:600">#</th>
                  <th style="padding:8px 12px;text-align:left;border-bottom:1px solid #e5e7eb;font-weight:600">セラーID</th>
                  <th style="padding:8px 12px;text-align:left;border-bottom:1px solid #e5e7eb;font-weight:600">URL</th>
                  <th style="padding:8px 12px;text-align:center;border-bottom:1px solid #e5e7eb;font-weight:600">状態</th>
                </tr>
              </thead>
              <tbody id="sellerTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- トースト通知 -->
<div class="toast" id="toast"></div>

<script src="/static/app.js"></script>
</body>
</html>
