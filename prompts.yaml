# ──────────────────────────────────────────────────────────────────
# prompts.yaml - Gemini API プロンプト設定
#
# このファイルを編集するだけで、AIの判定ルールを変更できます。
# app.py を再起動すると変更が反映されます。
#
# {title}       → 商品タイトルに置換されます
# {size_info}   → サイズ情報に置換されます（size_check のみ）
# ──────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────
# 絶対除外カテゴリ判定
# 該当した商品は仕入れ候補から除外されます
# ─────────────────────────────────────────────
exclude_absolute: |
  以下の商品が「絶対除外カテゴリ」に該当するか判定してください。
  Amazon FBAでの販売・輸送リスク・安全リスクを考慮した除外リストです。

  ■ 絶対除外カテゴリ:

  1. 食品・飲料・サプリメント・口に入る可能性があるもの

  2. 衣類・ファッション系（服・靴・バッグ・財布・アクセサリー等）
     ※ただしウィッグ・付け毛・エクステは除外しない

  3. 美容品・コスメ・スキンケア・メイク用品・化粧品・香水
     ※ただしウィッグ・付け毛・エクステは除外しない

  4. 家庭用コンセント（AC100V）を直接使用する商品
     ※ただしUSB給電・シガーソケットで動く商品はOK
     ※PSEマーク必要な電気用品（電源タップ・変圧器・充電器・照明器具等）も除外

  5. マグネット・磁石を使用・含有する商品
     （マグネットシート・磁石おもちゃ・マグネット収納・ネオジム磁石等）

  6. 刃物・刃を持つ製品全般
     （ナイフ・サバイバルナイフ・折りたたみナイフ・十徳ナイフ、
      包丁・ペティナイフ・キッチンナイフ、
      カミソリ・替え刃・シェービング用刃、
      剣・刀・模造刀・日本刀・レプリカ刀剣）
     ※ただし明らかなおもちゃ・玩具（おもちゃの刀・フォームソード・子供用剣おもちゃ等）は除外しない

  7. 牽引・吊り上げ・荷重がかかる製品・命綱になる製品
     （牽引ロープ・レッカーロープ・トーストラップ、
      チェーンブロック・ホイスト・クレーンフック、
      荷締めベルト・ラッシングベルト・タイダウンベルト、
      釣り上げ用フック・シャックル・カラビナ、
      滑車・ウインチ・牽引フック）
     ※ただし釣り用品（釣り竿・リール・ルアー・釣り糸等）は除外しない

  8. 登山・クライミング用品全般
     （ハーネス・ザイル・クライミングロープ・アンカー・
      確保器・下降器・クランポン・アイスアックス等）

  9. 安全用品・命を守る保護具全般
     （ヘルメット（バイク用・自転車用・工事用・スポーツ用問わず全て）、
      救命胴衣・ライフジャケット・フローティングベスト、
      防弾ベスト・防護服、
      安全帯・墜落制止用器具・胴ベルト）

  10. スプレー缶・エアゾール製品全般
      （スプレー塗料・潤滑スプレー・殺虫スプレー・制汗スプレー等）

  11. 電池・バッテリー単体全般
      （乾電池・充電池・リチウム電池・ボタン電池・バッテリーセル・バッテリーパック等、
       電池そのものの商品は全て除外。
       ※モバイルバッテリーも除外。
       ※ただし「電池で動く商品」「電池付属の商品」は除外しない）

  12. 高出力レーザーポインター・レーザー機器
      （1mW超のレーザーポインター・レーザーモジュール等）

  13. 技適マークなしの電波を発する機器
      （無線機・トランシーバー・特定小電力無線機器等で技適表示のないもの）

  14. タバコ・電子タバコ・加熱式タバコ・ニコチン製品

  15. ライター・マッチ・着火剤

  16. 花火・爆竹・発炎筒

  17. 医療機器全般
      （コンタクトレンズ・血圧計・体温計・医療用サポーター・
       AED・注射器・医療用マスク等）

  18. 農薬・殺虫剤・除草剤・殺鼠剤

  19. ゴルフ専用品・ゴルフクラブ関連
      （ゴルフクラブ本体（ドライバー・アイアン・パター・ウェッジ等）、
       クラブのグリップ・シャフト・ヘッド等のクラブ部品、
       ヘッドカバー・クラブカバー、
       ゴルフバッグ・キャディバッグ、
       ゴルフボール・ゴルフティー、
       ゴルフ専用グローブ・ゴルフウェア）
     ※ただし以下は除外しない:
       - グリップテープ・バーテープ（汎用品として他スポーツにも使えるもの）
       - 練習用人工芝・練習マット（室内練習用途で汎用性があるもの）
       - ゴルフ練習器具で汎用性の高いもの

  商品タイトル: {title}

  以下のJSON形式で回答してください（説明不要）:
  {{
    "excluded": true または false,
    "reason": "除外理由（excluded=trueの場合のみ）",
    "category": "food" または "fashion" または "beauty" または "ac100v_pse" または "magnet" または "blade" または "load_bearing" または "climbing" または "safety_gear" または "spray" または "battery" または "laser" または "radio" または "tobacco" または "fire" または "firework" または "medical" または "pesticide" または "none"
  }}

# ─────────────────────────────────────────────
# 安全リスク要確認フラグ
# 除外はしないが、要確認フラグが立ちます
# ─────────────────────────────────────────────
review_flag: |
  以下の商品が「安全リスク要確認カテゴリ」に該当するか判定してください。

  要確認カテゴリ（フラグを立てるだけ、除外はしない）:
  1. 車・バイクの重要保安部品（ブレーキ・ステアリング・サスペンション等、破損が事故直結）
  2. 乗り物の構造部品で破損が怪我に直結するもの
  ※ 車内用品（シートカバー・カーマット・収納等）はOK
  ※ 車用アクセサリー・装飾品はOK
  ※ USB給電・シガーソケット・電池の商品はOK

  3. 釣り用ルアー全般（意匠権の判断が必要なため、仕入れ可否は人間が最終確認）
     特に以下は優先的にフラグを立てる:
     - タイトルに「コピー」「レプリカ」「類似」「風」「同型」「偽」「inspired」などの表現がある
     - 極端に安価な有名ブランドルアー（メガバス・デュエル・ラパラ・スミス等）

  商品タイトル: {title}

  以下のJSON形式で回答してください（説明不要）:
  {{
    "needs_review": true または false,
    "reason": "要確認理由（needs_review=trueの場合のみ）"
  }}

# ─────────────────────────────────────────────
# ブランド品判定
# 有名ブランド品は除外されます
# ─────────────────────────────────────────────
brand_check: |
  以下の商品タイトルから、「有名ブランド品」かどうか判定してください。

  判定基準:
  - ノーブランド・ジェネリック・無名メーカー → false（除外しない）
  - 有名ブランド（Nike・Apple・Sony・LEGO等）→ true（除外対象）

  商品タイトル: {title}

  以下のJSON形式で回答してください（説明不要）:
  {{
    "is_branded": true または false,
    "brand_name": "ブランド名（is_branded=trueの場合）"
  }}

# ─────────────────────────────────────────────
# 大型サイズ判定
# 商品カテゴリから大型かどうかを推測します
# （ヤフオクには梱包サイズが載らないため、商品種別で判断）
# ─────────────────────────────────────────────
size_check: |
  以下の商品タイトルから、「大型商品（持ち運びが困難なサイズ）」かどうか
  商品の種類から推測して判定してください。

  大型と判定する（除外）:
  - 家具本体（棚・テーブル・椅子・ソファ・ベッド等）
  - 大型家電本体（テレビ・冷蔵庫・洗濯機・電子レンジ・エアコン等）
  - 自転車・電動キックボード・スクーター本体
  - タイヤ・ホイール
  - 楽器本体（ギター・ベース・ドラムセット・キーボード・ピアノ等）
  - 大型スポーツ用品本体（スキー板・サーフボード・テント等）

  小型・中型とみなしてOK（除外しない）:
  - スタンド・台・ホルダー・置き台（ギタースタンド・譜面台・テレビ台等）
  - ケース・袋・カバー・ストラップ・部品・パーツ
  - 弦・ピック等の消耗品・アクセサリー
  - スマホ・タブレット・PC周辺機器
  - 小物・雑貨・工具

  商品タイトル: {title}
  サイズ情報: {size_info}

  以下のJSON形式で回答してください（説明不要）:
  {{
    "is_oversized": true または false,
    "reason": "判定理由"
  }}

# ─────────────────────────────────────────────
# 同一商品判定（画像）
# 複数の商品画像を比較して同一商品かを判定します
# ─────────────────────────────────────────────
same_product: |
  以下の商品画像を見て、これらが「同一商品（個数違い・色違い・セット内容違いを含む）」かどうか判定してください。

  判定基準:
  - 同じ製品カテゴリで見た目が明らかに同じ → 同一
  - 個数だけ違う（1個入り/5個入り等）→ 同一
  - 色違い → 同一
  - 全く別の商品 → 異なる

  以下のJSON形式で回答してください（説明不要）:
  {{
    "same_product": true または false,
    "confidence": "high" または "medium" または "low"
  }}
