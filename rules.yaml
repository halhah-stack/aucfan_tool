# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# rules.yaml — 除外ルール管理ファイル
#
# 【メンテ方法】
#   このファイルを直接編集 → bash start.sh で再起動
#   変更後の再起動だけで反映されます。コードの編集は不要です。
#
# 【セクション説明】
#   title_keywords : タイトル文字列に含まれていれば即除外（Gemini不使用・高速）
#   maker_keywords : タイトル先頭のメーカー・ブランド名で除外
#   trading_card_keywords : トレーディングカード関連（Gemini判定に委ねる）
#   automotive_keywords : 自動車・バイク関連（メーカー名除外をスキップ）
#   custom_rules   : NG理由分析から学習したカスタム除外ルール
#                    アプリのGemini分析パネルで提案されたキーワードをここに追記する
#
# 【custom_rules の書き方】
#   - keyword: フライパン          ← 除外したいキーワード（title_keywords にも追記推奨）
#     category: 衛生リスク商品     ← カテゴリ名（自由記述）
#     reason: 食品と直接接触する調理器具は中古品として衛生リスクがある
#     added: 2026-05-21            ← 追加日
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━


